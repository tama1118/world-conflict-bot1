name: World Conflict Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "5 21 * * 1-5"  # 平日 6:05 JST
    - cron: "5 0 * * 6,0"   # 土日 9:05 JST

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai feedparser requests

      - name: Ensure history files exist
        run: |
          if [ ! -f sent_articles.json ]; then
            echo "[]" > sent_articles.json
          fi

          if [ ! -f daily_memory.json ]; then
            cat <<'EOF' > daily_memory.json
          {
            "last_topics": []
          }
          EOF
          fi

      - name: Run bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENAI_MODEL: gpt-4.1-mini
        run: |
          python bot.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sent_articles.json daily_memory.json
          git diff --cached --quiet || git commit -m "Update bot memory and history"
          git push
